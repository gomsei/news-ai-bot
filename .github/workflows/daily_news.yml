name: Daily News Reporter

on:
  # schedule:
  #  - cron: '10 22 * * *' # 한국 시간 오전 8시
  workflow_dispatch: 
  repository_dispatch:
    types: [pipedream_trigger] # Pipedream에서 보낼 이벤트 이름

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 추가 (방법2 선택시)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests bs4 pandas holidays  # 실제 사용하시는 라이브러리 모두 기재

    - name: Run news script
      env:
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python main.py
