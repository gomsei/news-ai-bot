name: Daily News Reporter

on:
  schedule:
    # 매일 아침 8시 실행 (UTC 기준이므로 한국 시간 08:00은 UTC 23:00입니다)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동으로 실행하고 싶을 때 사용

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl  # 필요한 라이브러리 추가

    - name: Run news script
      env:
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python main.py  # 본인의 파이썬 파일명으로 수정
