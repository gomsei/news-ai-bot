name: Daily Executive News Briefing

on:
  schedule:
    - cron: '0 22 * * *' # UTC 22:00 = KST 07:00
  workflow_dispatch: 

# 글로벌 환경 변수 설정 (Node.js 24 강제 사용)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4는 내부적으로 최신 노드를 지원함

      - name: Set up Python
        uses: actions/setup-python@v5 # v4의 경고를 해결한 최신 v5 사용
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -U google-generativeai requests beautifulsoup4 lxml pandas

      - name: Execute Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: python main.py
